<section class="panel">
  <div class="panel-header">
    <div>
      <h2>Agentes</h2>
      <p>Disponibilidad calculada desde las llamadas activas.</p>
    </div>
  </div>

  @if (agents().length === 0) {
    <div class="empty-state">Sin agentes reportados todavía.</div>
  } @else {
    <div class="list">
      @for (agent of agents(); track agent.agentId) {
        <article class="row">
          <div>
            <strong>{{ agent.agentId }}</strong>
            <span>{{ agent.updatedAt | date: 'mediumTime' }}</span>
          </div>
          <span [class]="'badge ' + statusClass(agent.status)">{{ agent.status }}</span>
        </article>
      }
    </div>
  }
</section>
